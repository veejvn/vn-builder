# d:\Code\Web\NextJS\vn-builder\.github\workflows\deploy.yml
name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["CI - Next.js"] # Chỉ chạy sau khi CI hoàn tất
    types:
      - completed

jobs:
  deploy:
    # Điều kiện: CI phải thành công (Success)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # NEXTAUTH_URL sẽ được map dựa theo nhánh trong quá trình chạy (xem bước bên dưới)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      # --- PHÂN LOẠI MÔI TRƯỜNG: NHÁNH DEV ---
      - name: Pull Vercel Environment (Preview / dev)
        if: github.event.workflow_run.head_branch == 'dev'
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Project (Preview / dev)
        if: github.event.workflow_run.head_branch == 'dev'
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (Preview / dev)
        if: github.event.workflow_run.head_branch == 'dev'
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

      # --- PHÂN LOẠI MÔI TRƯỜNG: NHÁNH MAIN ---
      - name: Pull Vercel Environment (Production / main)
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Project (Production / main)
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (Production / main)
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"