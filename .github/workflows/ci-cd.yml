name: CI/CD - Next.js

on:
  push:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test --if-present

      - name: Build check
        run: npm run build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      # --- PHÂN LOẠI MÔI TRƯỜNG: NHÁNH DEV ---
      - name: Pull Vercel Environment (Preview / dev)
        if: github.ref == 'refs/heads/dev'
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Project (Preview / dev)
        if: github.ref == 'refs/heads/dev'
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (Preview / dev)
        if: github.ref == 'refs/heads/dev'
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

      # --- PHÂN LOẠI MÔI TRƯỜNG: NHÁNH MAIN ---
      - name: Pull Vercel Environment (Production / main)
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Project (Production / main)
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (Production / main)
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"